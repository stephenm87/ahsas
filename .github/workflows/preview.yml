name: Deploy Preview

# Runs only on pull requests — comments the Netlify preview URL
# so you can click straight to a live preview without searching Netlify dashboard
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  preview-url:
    name: Post Preview Link
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const repo = context.repo.repo;

            // Netlify preview URL format: deploy-preview-{PR}--{site-name}.netlify.app
            const siteSlug = 'ahsas-project';
            const previewUrl = `https://deploy-preview-${prNumber}--${siteSlug}.netlify.app`;

            const body = [
              `### 🔍 Deploy Preview`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Status** | Netlify is building... check the Netlify dashboard for live status |`,
              ``,
              `> Preview updates automatically on each new commit to this PR.`,
            ].join('\n');

            // Find existing preview comment to update instead of duplicating
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Deploy Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body,
              });
            }
